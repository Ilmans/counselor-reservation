
<style>
#erd7 svg { width: 100%; height: auto; }
#erd7 svg.erDiagram .divider path { stroke-opacity: 0.4; }
#erd7 svg.erDiagram .row-rect-odd path,
#erd7 svg.erDiagram .row-rect-odd rect,
#erd7 svg.erDiagram .row-rect-even path,
#erd7 svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd7" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#AFA9EC' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#633806' : '#FAEEDA',
  },
});

const diagram = `erDiagram

  users {
    int id PK
    string name
    string email
    string phone_wa
    string password_hash
    boolean is_anonymous
    string anon_alias
    timestamp created_at
  }

  admins {
    int id PK
    string name
    string email
    string password_hash
    timestamp created_at
  }

  specializations {
    int id PK
    string name
    string description
  }

  categories {
    int id PK
    string name
    string description
  }

  counselors {
    int id PK
    int specialization_id FK
    string name
    string email
    string phone_wa
    string bio
    string photo_url
    enum pricing_type
    decimal price_per_hour
    int session_duration_minutes
    enum status
    timestamp created_at
  }

  counselor_categories {
    int id PK
    int counselor_id FK
    int category_id FK
  }

  counselor_schedules {
    int id PK
    int counselor_id FK
    int day_of_week
    time open_time
    time close_time
    boolean is_active
  }

  consultations {
    int id PK
    int user_id FK
    int counselor_id FK
    date consultation_date
    time estimated_time
    int queue_position
    string meeting_link
    enum method
    enum status
    boolean is_anonymous
    decimal total_price
    timestamp created_at
  }

  consultation_notes {
    int id PK
    int consultation_id FK
    int counselor_id FK
    text note_content
    boolean is_private
    timestamp created_at
  }

  consultation_feedbacks {
    int id PK
    int consultation_id FK
    int rating
    string comment
    boolean is_anonymous
    timestamp submitted_at
  }

  specializations ||--o{ counselors : "1 spesialisasi"
  categories ||--o{ counselor_categories : tagged_to
  counselors ||--o{ counselor_categories : has
  counselors ||--o{ counselor_schedules : sets
  counselors ||--o{ consultations : handles
  users ||--o{ consultations : books
  consultations ||--o| consultation_notes : has
  consultations ||--o| consultation_feedbacks : receives
`;

const { svg } = await mermaid.render('erd7-svg', diagram);
document.getElementById('erd7').innerHTML = svg;

document.querySelectorAll('#erd7 svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd7 svg.erDiagram .row-rect-odd path, #erd7 svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
